name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev libxrandr-dev libxinerama-dev libappindicator3-dev librsvg2-dev
      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny
      - name: Rust fmt check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Security audit
        run: cargo audit
      - name: License + dep check
        run: cargo deny check
      - name: Frontend tests
        run: npm ci && npx vitest run
      - name: Build
        run: cargo build --release
